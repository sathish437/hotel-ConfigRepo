spring:
  application:
    name: API-Gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**,/auth
          filters:
            - RewritePath=/auth(?<segment>/?.*), /api/auth$\{segment}

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/bookings/**,/bookings
          filters:
            - RewritePath=/bookings(?<segment>/?.*), /api/bookings$\{segment}

        - id: hotel-service
          uri: lb://hotel-service
          predicates:
            - Path=/hotels/**,/hotels
          filters:
            - RewritePath=/hotels(?<segment>/?.*), /api/hotels$\{segment}

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/